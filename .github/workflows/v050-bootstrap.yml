name: v0.5.0 Bootstrap

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v050-bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feat/v0.5.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/v0.5.0
          persist-credentials: true
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Apply v0.5.0 transformations
        run: |
          python3 scripts/v050_migrate.py
          python3 scripts/v050_crypto_refactor.py
          python3 scripts/v050_docs.py
      - name: Format
        run: cargo fmt --all
      - name: Refresh lockfile
        run: cargo update -w
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "Transformations already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(v0.5.0): finalize implementation and release docs"
          git push origin HEAD:feat/v0.5.0
      - name: Check workspace
        id: check
        continue-on-error: true
        run: cargo check --workspace --all-targets --all-features --message-format=short > v050-check.log 2>&1
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: v050-check-${{ github.run_id }}
          path: v050-check.log
          if-no-files-found: error
          retention-days: 2
      - name: Propagate check failure
        if: steps.check.outcome == 'failure'
        run: |
          cat v050-check.log
          exit 1
