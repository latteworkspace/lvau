name: v0.5.0 Diagnostics

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: v050-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnostics:
    if: github.head_ref == 'feat/v0.5.0'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxi-dev libgl1-mesa-dev
      - name: Run Clippy
        id: clippy
        continue-on-error: true
        shell: bash
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings > clippy.log 2>&1
      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: cargo test --locked --workspace --all-features -- --nocapture > tests.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: v050-diagnostics-${{ runner.os }}-${{ github.run_id }}
          path: |
            clippy.log
            tests.log
          if-no-files-found: error
          retention-days: 2
      - name: Propagate failures
        if: steps.clippy.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: |
          echo '=== clippy tail ==='
          tail -n 100 clippy.log
          echo '=== tests tail ==='
          tail -n 160 tests.log
          exit 1
