name: v0.5.0 Diagnostics

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: v050-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  correct-and-validate:
    if: github.head_ref == 'feat/v0.5.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/v0.5.0
          persist-credentials: true
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
      - name: Apply diagnosed corrections
        run: python3 scripts/v050_fix_ci.py
      - name: Format
        run: cargo fmt --all
      - name: Commit corrections
        run: |
          if git diff --quiet; then
            echo "Corrections already applied"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add crates
            git commit -m "fix(v0.5.0): satisfy clippy and JSON contract tests"
            git push origin HEAD:feat/v0.5.0
          fi
      - name: Install Linux GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxi-dev libgl1-mesa-dev
      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --locked --workspace --all-features
